<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=http://patilerim.tr">
<meta name="robots" content="noindex">
<link rel="canonical" href="http://patilerim.tr">
<title>Patilerim — Yönlendiriliyor...</title>
<style>
  body {
    margin: 0;
    background: #FAF6EE;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1C1917;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
  }
  .box { max-width: 360px; }
  .dot {
    width: 14px; height: 14px;
    background: #F43348;
    border-radius: 50%;
    display: inline-block;
    margin-bottom: 24px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.3px; }
  p { font-size: 14px; color: #78716C; margin: 0 0 20px; line-height: 1.5; }
  a { color: #F43348; text-decoration: none; font-weight: 600; font-size: 14px; }
</style>
<script>
  window.location.replace('http://patilerim.tr');
</script>
</head>
<body>
<div class="box">
  <div class="dot"></div>
  <h1>Patilerim</h1>
  <p>Sayfa taşındı. Yönlendiriliyorsun…</p>
  <a href="http://patilerim.tr">Tıklamazsan buraya bas →</a>
</div>
</body>
</html>
